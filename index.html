<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EGOSPHERE DEBUG</title>
  <style>
    body{background:#0b0f19;color:#fff;font-family:Arial,sans-serif;padding:16px}
    .ok{color:#7CFF9A} .err{color:#FF7C7C} pre{background:#0f1320;padding:12px;border-radius:8px;overflow:auto}
  </style>
</head>
<body>
  <h2>EGOSPHERE — DEBUG MODE</h2>
  <div id="log"></div>

  <script>
    const LOG = (t, cls='')=>{
      const el = document.createElement('div'); el.innerHTML = `<b>${new Date().toISOString()}</b> — ${t}`;
      if(cls) el.className = cls;
      document.getElementById('log').appendChild(el);
      console.log(t);
    };

    (async function runDebug(){
      LOG('1) Скрипт загружен');

      // 2) Проверим, что ты вставил адрес кошелька корректно
      const WAL = "UQCU-ZQzluQ1Vb0JNVnvTpgsHfFpFEafqC8uWN70P-FL5-eC"; // <- убедись, что это твой адрес
      if(!WAL || WAL.length < 10){
        LOG('Ошибка: MY_OWNER_WALLET_ADDRESS не задан или слишком короткий', 'err'); return;
      }
      LOG('2) WAL address looks ok: ' + WAL);

      // 3) Проверим доступ к TON API (simple GET)
      const apiURL = `https://testnet.tonapi.io/v2/blockchain/accounts/${WAL}/transactions?limit=3`;
      LOG('3) Попытка fetch -> ' + apiURL);
      try{
        const r = await fetch(apiURL);
        LOG('fetch status: ' + r.status + ' ('+ r.statusText +')');
        const json = await r.json();
        LOG('fetch ok, transactions length: ' + (json.transactions ? json.transactions.length : 'no field'));
        const pretty = document.createElement('pre'); pretty.textContent = JSON.stringify(json.transactions ? json.transactions.slice(0,3) : json, null, 2);
        document.getElementById('log').appendChild(pretty);
      }catch(e){
        LOG('Ошибка fetch к TON API: ' + e.message, 'err');
      }

      // 4) Проверим наличие TonConnectUI (скрипт внешней библиотеки)
      LOG('4) Проверяем window.TONConnectUI...');
      if(window.TONConnectUI){
        LOG('TONConnectUI найден', 'ok');
      } else {
        LOG('TONConnectUI НЕ найден. Попытаемся загрузить скрипт динамически.', 'err');
        try {
          await new Promise((res, rej)=>{
            const s = document.createElement('script');
            s.src = 'https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js';
            s.onload = ()=>{ LOG('Динамически загружен tonconnect-ui', 'ok'); res(); };
            s.onerror = ()=>{ LOG('Не удалось загрузить tonconnect-ui (network/CSP?)', 'err'); rej(); };
            document.head.appendChild(s);
          });
        } catch(e) { LOG('Ошибка при динамической загрузке: ' + e, 'err'); }
      }

      // 5) Попытка инициализации TonConnectUI (если удаётся)
      try {
        if(window.TONConnectUI){
          const ui = new window.TONConnectUI.TonConnectUI({ manifestUrl: location.href + 'manifest.json', buttonRootId: 'log' });
          LOG('Инициализация TonConnectUI OK', 'ok');
        } else {
          LOG('TonConnectUI отсутствует — пропускаем инициализацию', 'err');
        }
      } catch(e){
        LOG('Ошибка при init TonConnectUI: ' + e.message, 'err');
      }

      // 6) Финал
      LOG('DEBUG завершён. Если есть ошибки выше — пришли скрин консоли/страницы.', (document.querySelectorAll('.err').length ? 'err' : 'ok'));
    })();
  </script>
</body>
</html>
